<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jhopdi Event Scanner 2026</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0B1C36;color:#fff;min-height:100vh}
.header{background:#C9960C;padding:14px 20px;text-align:center}
.header h1{font-size:18px;color:#0B1C36;font-weight:700}
.header p{font-size:12px;color:#0B1C36;margin-top:3px}
.container{max-width:480px;margin:0 auto;padding:16px}
.counter{display:flex;gap:10px;margin-bottom:14px}
.count-box{flex:1;background:#122347;border-radius:10px;padding:12px 8px;text-align:center}
.count-box h3{font-size:28px;font-weight:700}
.count-box p{font-size:11px;color:#94A3B8;margin-top:2px}
.count-box.green h3{color:#22C55E}
.count-box.orange h3{color:#F59E0B}
.count-box.red h3{color:#EF4444}
.status-bar{background:#122347;border-radius:8px;padding:10px 14px;font-size:13px;text-align:center;margin-bottom:14px;color:#94A3B8;min-height:38px;display:flex;align-items:center;justify-content:center}
#reader{width:100%;border-radius:12px;overflow:hidden;margin-bottom:12px;display:none}
#reader video{width:100%!important}
.btn{display:block;width:100%;padding:15px;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:12px}
.btn-start{background:#C9960C;color:#0B1C36}
.btn-next{background:#1D4ED8;color:#fff;display:none}
.btn-stop{background:#374151;color:#fff;display:none}
.result-card{display:none;border-radius:14px;padding:22px 18px;text-align:center;margin-top:14px}
.result-card.valid{background:#065F46;border:2px solid #22C55E;display:block}
.result-card.used{background:#78350F;border:2px solid #F59E0B;display:block}
.result-card.invalid{background:#7F1D1D;border:2px solid #EF4444;display:block}
.result-icon{font-size:52px;margin-bottom:10px}
.result-title{font-size:22px;font-weight:700;margin-bottom:14px;line-height:1.3}
.result-detail{background:rgba(0,0,0,.25);border-radius:8px;padding:12px;text-align:left;font-size:14px;line-height:2}
.lbl{color:#CBD5E1;font-size:11px;display:block}
.val{font-size:15px;font-weight:700;display:block}
.manual-section{margin-top:22px;border-top:1px solid #1e3a5f;padding-top:16px}
.manual-label{font-size:12px;color:#64748B;text-align:center;margin-bottom:8px}
.manual-wrap{display:flex;gap:8px}
.manual-input{flex:1;padding:12px;border-radius:8px;border:1px solid #1e3a5f;background:#122347;color:#fff;font-size:14px;text-transform:uppercase;letter-spacing:1px}
.manual-input::placeholder{text-transform:none;letter-spacing:0;color:#475569}
.btn-verify{padding:12px 14px;background:#C9960C;color:#0B1C36;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap}
</style>
</head>
<body>
<div class="header">
  <h1>🎪 Jhopdi.com Meetup 2026</h1>
  <p>Event Entry Scanner | June 6, 2026</p>
</div>
<div class="container">
  <div class="counter">
    <div class="count-box green"><h3 id="cntValid">0</h3><p>Checked In</p></div>
    <div class="count-box orange"><h3 id="cntUsed">0</h3><p>Already Used</p></div>
    <div class="count-box red"><h3 id="cntInvalid">0</h3><p>Rejected</p></div>
  </div>
  <div class="status-bar" id="statusBar">Scanner ready — press Start</div>
  <div id="reader"></div>
  <button class="btn btn-start" id="btnStart" onclick="startScanner()">📷 Start Scanner</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopScanner()" style="display:none">⏹ Stop Scanner</button>
  <button class="btn btn-next" id="btnNext" onclick="nextScan()" style="display:none">🔄 Next Guest</button>
  <div class="result-card" id="resultCard">
    <div class="result-icon" id="resIcon"></div>
    <div class="result-title" id="resTitle"></div>
    <div class="result-detail" id="resDetail"></div>
  </div>
  <div class="manual-section">
    <p class="manual-label">📝 Camera not working? Enter Entry ID manually:</p>
    <div class="manual-wrap">
      <input class="manual-input" id="manualId" type="text" placeholder="e.g. JHO-2026-001"/>
      <button class="btn-verify" onclick="manualCheck()">✔ Verify</button>
    </div>
  </div>
</div>

<script>
// ── Apps Script Web App URL — validation backend
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqKzFYLqLxLTODho3Tyf5ko1EvlYoSpGx7zhLnQYUK9ESCLSJLx3vEVPFhlLAHx_kM/exec";

var html5QrCode = null;
var cntValid=0, cntUsed=0, cntInvalid=0;
var lastScanned='', lastScannedTime=0;

function startScanner(){
  clearResult();
  setStatus('Starting camera...','info');
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='block';
  document.getElementById('reader').style.display='block';

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(function(cameras){
    if(cameras && cameras.length){
      var cameraId = cameras[cameras.length-1].id;
      html5QrCode.start(
        cameraId,
        { fps:10, qrbox:{ width:250, height:250 } },
        function(decodedText){
          var now = Date.now();
          if(decodedText !== lastScanned || (now - lastScannedTime) > 4000){
            lastScanned = decodedText;
            lastScannedTime = now;
            html5QrCode.stop().then(function(){
              document.getElementById('reader').style.display='none';
              document.getElementById('btnStop').style.display='none';
              document.getElementById('btnNext').style.display='block';
              setStatus('Validating...','info');
              callBackend(decodedText);
            });
          }
        },
        function(error){}
      ).catch(function(err){
        setStatus('Camera error: '+err,'error');
        document.getElementById('btnStart').style.display='block';
        document.getElementById('btnStop').style.display='none';
      });
      setStatus('📷 Point camera at QR code','ok');
    } else {
      setStatus('No camera found on device','error');
      document.getElementById('btnStart').style.display='block';
      document.getElementById('btnStop').style.display='none';
    }
  }).catch(function(err){
    setStatus('Camera permission denied. Please allow camera.','error');
    document.getElementById('btnStart').style.display='block';
    document.getElementById('btnStop').style.display='none';
  });
}

function stopScanner(){
  if(html5QrCode){
    html5QrCode.stop().then(function(){
      document.getElementById('reader').style.display='none';
      document.getElementById('btnStart').style.display='block';
      document.getElementById('btnStop').style.display='none';
      setStatus('Scanner stopped','info');
    }).catch(function(){});
  }
}

function nextScan(){
  clearResult();
  lastScanned='';
  lastScannedTime=0;
  document.getElementById('btnNext').style.display='none';
  startScanner();
}

// ── Call Apps Script via fetch (works from GitHub Pages)
function callBackend(qrCode){
  var url = APPS_SCRIPT_URL + "?action=check&qr=" + encodeURIComponent(qrCode);
  fetch(url, { redirect: 'follow' })
    .then(function(res){ return res.json(); })
    .then(function(data){ showResult(data); })
    .catch(function(err){
      setStatus('Connection error. Check internet.','error');
      document.getElementById('btnNext').style.display='block';
    });
}

function showResult(data){
  var card=document.getElementById('resultCard');
  card.className='result-card';
  var icon,title,detail;
  if(data.status==='valid'){
    card.classList.add('valid');
    icon='✅'; title='ENTRY VALID — LET THEM IN';
    detail=dRow('Name',data.name)+dRow('Company',data.company)+dRow('Entry ID',data.entryId)+dRow('Check-in',data.time);
    setStatus('✅ Valid — '+data.name,'ok');
    cntValid++; document.getElementById('cntValid').innerText=cntValid;
  }else if(data.status==='used'){
    card.classList.add('used');
    icon='⚠️'; title='ALREADY CHECKED IN — STOP';
    detail=dRow('Name',data.name)+dRow('Entry ID',data.entryId)+dRow('First Check-in',data.time);
    setStatus('⚠️ Duplicate — '+data.name,'warn');
    cntUsed++; document.getElementById('cntUsed').innerText=cntUsed;
    if(navigator.vibrate) navigator.vibrate([200,80,200]);
  }else{
    card.classList.add('invalid');
    icon='❌'; title='INVALID QR — DENY ENTRY';
    detail=dRow('Code',data.raw||'-');
    setStatus('❌ Invalid QR','error');
    cntInvalid++; document.getElementById('cntInvalid').innerText=cntInvalid;
    if(navigator.vibrate) navigator.vibrate([300,100,300]);
  }
  document.getElementById('resIcon').innerText=icon;
  document.getElementById('resTitle').innerText=title;
  document.getElementById('resDetail').innerHTML=detail;
}

function dRow(label,value){
  return '<span class="lbl">'+label+'</span><span class="val">'+(value||'N/A')+'</span>';
}

function manualCheck(){
  var val=document.getElementById('manualId').value.trim().toUpperCase();
  if(!val){setStatus('Please enter Entry ID','warn');return;}
  document.getElementById('manualId').value='';
  clearResult();
  document.getElementById('btnNext').style.display='block';
  setStatus('Validating: '+val,'info');
  callBackend(val);
}

function clearResult(){
  var card=document.getElementById('resultCard');
  card.className='result-card';
  document.getElementById('resIcon').innerText='';
  document.getElementById('resTitle').innerText='';
  document.getElementById('resDetail').innerHTML='';
}

function setStatus(msg,type){
  var bar=document.getElementById('statusBar');
  bar.innerHTML=msg;
  bar.style.color=type==='ok'?'#22C55E':type==='error'?'#EF4444':type==='warn'?'#F59E0B':'#94A3B8';
}

document.getElementById('manualId').addEventListener('keydown',function(e){
  if(e.key==='Enter') manualCheck();
});
</script>
</body>
</html>
